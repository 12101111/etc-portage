AR=llvm-ar
AS="aarch64-unknown-linux-musl-as"
CC="aarch64-unknown-linux-musl-clang"
CPP="aarch64-unknown-linux-musl-clang-cpp"
CROSS_COMPILE="aarch64-unknown-linux-musl-"
CXX="aarch64-unknown-linux-musl-clang++"
DLLTOOL=llvm-dlltool
HOSTCC="clang"
HOSTCXX="clang++"
LD=ld.lld
LLVM=1
NM=llvm-nm
OBJCOPY=llvm-objcopy
RANLIB=llvm-ranlib
READELF=llvm-readelf
STRIP=llvm-strip
CFLAGS="-O2 -pipe -fomit-frame-pointer"
CXXFLAGS="${CFLAGS}"
LDFLAGS=""
RUSTFLAGS="-Copt-level=2 -Ccodegen-units=1 -Ctarget-feature=-crt-static"
